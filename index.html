<!DOCTYPE html>
<html lang="en">
<head>

    <title>DEFENCE NEWS COLLECTION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f9f9f9;
            --bg-secondary: #f1f1f1;
            --bg-card: #ffffff;
            --text-primary: #222222;
            --text-secondary: #666666;
            --accent: #2a5d9f;
            --accent-hover: #1d406b;
            --border: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.07);
        }

        .light-theme {
            /* No override needed, light is default */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        .header {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 2.2rem;
            font-family: 'Playfair Display', 'Times New Roman', Times, serif;
            font-weight: 700;
            color: #222222;
            text-shadow: none;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-container {
            position: relative;
        }

        .search-bar {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border);
            border-radius: 25px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
            width: 300px;
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: var(--bg-primary);
            transform: translateY(-2px);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .tabs-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--shadow);
        }

        .tab.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .filters-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .sort-container {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
        }

        .sort-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .sort-btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .sort-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .news-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--shadow);
            border-color: var(--accent);
        }

        .news-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 2px solid var(--border);
        }

        .news-content {
            padding: 1.5rem;
        }

        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .news-description {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .news-date {
            font-weight: 500;
        }

        .news-source {
            color: var(--accent);
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .footer {
            background: var(--bg-secondary);
            padding: 2rem;
            margin-top: 4rem;
            border-top: 2px solid var(--border);
            text-align: center;
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
        }

        .latest-news-footer {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .auto-refresh-indicator {
            color: var(--accent);
            font-size: 0.8rem;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            background-color: var(--bg-card);
            margin: 15% auto;
            padding: 2rem;
            border: 2px solid var(--border);
            border-radius: 15px;
            width: 400px;
            max-width: 90%;
            text-align: center;
        }

        .modal h2 {
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .region-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1rem 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .region-btn {
            padding: 1rem;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .region-btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .search-bar {
                width: 250px;
            }

            .main-content {
                padding: 1rem;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }

            .filters-container {
                flex-direction: column;
                align-items: flex-start;
            }

            .sort-container {
                margin-left: 0;
            }
        }
    </style>
    <!-- Sidebar and main layout -->

<body>

    <header class="header">
        <div class="header-content">
            <div class="logo">DEFENCE NEWS COLLECTION</div>
            <div class="controls">
                <div class="search-container">
                    <input type="text" class="search-bar" placeholder="Search defense news..." id="searchBar">

    </header>

    <main class="main-content">
        <div class="featured-news" id="featuredNews">
            <!-- Featured news will be populated by JS -->
        </div>
        <div class="tabs-container" id="tabsContainer">
            <!-- Tabs will be populated by JavaScript -->
        </div>
        <div class="filters-container">
            <div class="filter-group">
                <button class="filter-btn active" onclick="setFilter('all')">All</button>
                <button class="filter-btn" onclick="setFilter('cyber')">Cyber</button>
                <button class="filter-btn" onclick="setFilter('military')">Military</button>
                <button class="filter-btn" onclick="setFilter('army')">Army</button>
                <button class="filter-btn" onclick="setFilter('navy')">Navy</button>
                <button class="filter-btn" onclick="setFilter('air force')">Air Force</button>
                <button class="filter-btn" onclick="setFilter('defense')">Defense</button>
                <button class="filter-btn" onclick="setFilter('weapons')">Weapons</button>
            </div>
            <div class="sort-container">
                <button class="sort-btn active" onclick="sortNews('newest')">Newest</button>
                <button class="sort-btn" onclick="sortNews('oldest')">Oldest</button>
            </div>
        </div>
        <div class="news-grid" id="newsGrid">
            <div class="loading">Loading defense news...</div>
        </div>
    </main>
    <!-- Popular News Popup -->
    <div id="popularNewsPopup" class="modal">
        <div class="modal-content popular-modal-content">
            <h2>🔥 Popular News</h2>
            <div id="popularNewsList"></div>
            <button onclick="closePopularNewsPopup()" class="close-popup-btn">✖ Close</button>
        </div>
    </div>

    <footer class="footer">

            <div class="latest-news-footer" id="latestNewsFooter">
                Latest news updated for your selected region
            </div>
            <div class="auto-refresh-indicator">
                ⏱️ Auto-refresh every 5 minutes
            </div>
        </div>
    </footer>

            ]

        // Initialize the application
        function init() {
            // Check if region is already selected
            const savedRegion = localStorage.getItem('selectedRegion');
            if (savedRegion) {
                currentRegion = savedRegion;
                setupTabs();
                loadNews();
            } else {
                showRegionModal();
            }

            // Setup event listeners
            setupEventListeners();
            
            // Start auto-refresh
            startAutoRefresh();
        }

        function showRegionModal() {
            document.getElementById('regionModal').style.display = 'block';
        }

        function selectRegion(region) {
            currentRegion = region;
            localStorage.setItem('selectedRegion', region);
            document.getElementById('regionModal').style.display = 'none';
            setupTabs();
            loadNews();
            updateFooter();
            showPopularNewsPopup(); // Show popup on region select
        }

        function setupTabs() {
            const tabsContainer = document.getElementById('tabsContainer');
            tabsContainer.innerHTML = '';

            const regions = Object.keys(rssFeeds);
            regions.forEach(region => {
                const tab = document.createElement('div');
                tab.className = `tab ${region === currentRegion ? 'active' : ''}`;
                tab.textContent = region === 'Global' ? '🌐 Global' : getRegionFlag(region) + ' ' + region;
                tab.onclick = () => switchRegion(region);
                tabsContainer.appendChild(tab);
            });
        }

        function getRegionFlag(region) {
            const flags = {
                US: '🇺🇸',
                India: '🇮🇳',
                Russia: '🇷🇺',
                China: '🇨🇳',
                UK: '🇬🇧',
                Israel: '🇮🇱',
                Japan: '🇯🇵',
                'South Korea': '🇰🇷',
                France: '🇫🇷',
                Germany: '🇩🇪',
                Australia: '🇦🇺',
                Canada: '🇨🇦',
                Brazil: '🇧🇷',
                'Middle East': '🕌',
                Europe: '🇪🇺',
                'Asia Pacific': '🌏'
            };
            return flags[region] || '🌐';
        }

        function switchRegion(region) {
            currentRegion = region;
            localStorage.setItem('selectedRegion', region);
            
            // Update active tab
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadNews();
            updateFooter();
        }

        function setupEventListeners() {
            // Search functionality
            const searchBar = document.getElementById('searchBar');
            searchBar.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    filterNews();
                }
            });

            searchBar.addEventListener('input', filterNews);
        }

                let success = false;
                for (let i = 0; i < rssUrls.length; i++) {
                    const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrls[i])}`;
                    try {
                        const response = await fetch(apiUrl);
                        const data = await response.json();
                        if (data.status === 'ok' && data.items && data.items.length > 0) {
                            allNews = data.items.map(item => ({
                                title: item.title,
                                description: item.description.replace(/<[^>]+>/g, '').slice(0, 200) + '...',

        function filterNews() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            let filteredNews = allNews;

            if (searchTerm) {
                filteredNews = filteredNews.filter(news => 
                    news.title.toLowerCase().includes(searchTerm) ||
                    news.description.toLowerCase().includes(searchTerm)
                );
            }

            // Filter by keyword
            if (currentFilter !== 'all') {
                filteredNews = filteredNews.filter(news => 
                    news.title.toLowerCase().includes(currentFilter) ||
                    news.description.toLowerCase().includes(currentFilter)
                );
            }

            // Sort news
            if (currentSort === 'newest') {
                filteredNews.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else {
                filteredNews.sort((a, b) => new Date(a.date) - new Date(b.date));
            }

            displayNews(filteredNews);
        }

        function displayNews(newsArray) {
            const newsGrid = document.getElementById('newsGrid');
            
            if (newsArray.length === 0) {
                newsGrid.innerHTML = '<div class="loading">No news found matching your criteria.</div>';
                return;
            }

            newsGrid.innerHTML = newsArray.map((news, index) => {
                const safeUrl = news.url && news.url !== '#' ? news.url : null;
                return `
                    <div class="news-card ${news.isPopular ? 'popular' : ''}" ${safeUrl ? `onclick=\"window.open('${safeUrl}', '_blank')\"` : `onclick=\"alert('No article URL available for this news item.')\"`}>
                        ${news.thumbnail ? `
                            <img src=\"${news.thumbnail}\" 
                                 alt=\"${news.title}\" 
                                 class=\"news-thumbnail\" 
                                 onerror=\"this.style.display='none'; this.nextElementSibling.style.borderTop='none';\"
                                 loading=\"lazy\">` : ''}
                        <div class=\"news-content\">
                            ${news.isPopular ? '<div class=\"popular-badge\">🔥 Popular</div>' : ''}
                            <h3 class=\"news-title\">${news.title}</h3>
                            <p class=\"news-description\">${news.description}</p>
                            <div class=\"news-meta\">
                                <span class=\"news-date\">${formatDate(news.date)}</span>
                                <span class=\"news-source\">${news.source}</span>
                            </div>
                            <div class=\"news-stats\">
                                <span class=\"news-views\">👁️ ${news.views.toLocaleString()} views</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

            currentSort = sort;

        function toggleTheme() {
            isDarkTheme = !isDarkTheme;
            document.body.classList.toggle('light-theme', !isDarkTheme);
            document.body.classList.toggle('dark-theme', isDarkTheme);
            const themeToggle = document.querySelector('.theme-toggle');
            themeToggle.textContent = isDarkTheme ? '🌙 Dark' : '☀️ Light';
            localStorage.setItem('theme', isDarkTheme ? 'dark' : 'light');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showFeaturedNews(newsArray) {
            const featuredNews = newsArray.slice(0, 1)[0];
            const featuredDiv = document.getElementById('featuredNews');
            if (!featuredNews) { featuredDiv.innerHTML = ''; return; }
            featuredDiv.innerHTML = `
                <div class="featured-news-card" onclick="window.open('${featuredNews.url}', '_blank')">
                    <img src="${featuredNews.thumbnail}" alt="${featuredNews.title}" class="featured-news-img">

                        <h2>${featuredNews.title}</h2>
                        <p>${featuredNews.description}</p>
                        <div class="news-meta">
                            <span class="news-date">${formatDate(featuredNews.date)}</span>
                            <span class="news-source">${featuredNews.source}</span>
                        </div>
                    </div>
                </div>
            `;
        }
        function showTrendingTopics(newsArray) {
            const trendingList = document.getElementById('trendingTopicsList');
            if (!trendingList) return;
            // Pick top 5 keywords from news titles
            const keywords = {};
            newsArray.forEach(news => {
                news.title.split(' ').forEach(word => {
                    if (word.length > 3) {
                        keywords[word.toLowerCase()] = (keywords[word.toLowerCase()] || 0) + 1;
                    }
                });
            });
            const sorted = Object.entries(keywords).sort((a, b) => b[1] - a[1]);
            trendingList.innerHTML = sorted.slice(0, 5).map(([word]) => `<li>${word.charAt(0).toUpperCase() + word.slice(1)}</li>`).join('');
        }
        function showPopularNewsPopup() {
            const popup = document.getElementById('popularNewsPopup');
